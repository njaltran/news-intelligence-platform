# put your configuration values here

[runtime]
log_level="WARNING"  # the system log level of dlt
# use the dlthub_telemetry setting to enable/disable anonymous usage data reporting, see https://dlthub.com/docs/reference/telemetry
dlthub_telemetry = true

[sources.gdelt]
query = "climate"
chunk_minutes = 60

# ClickHouse destination. Native TCP on 9000 for the loader, HTTP on
# 8123 reserved for ad-hoc queries. Password lives in
# .dlt/secrets.toml (gitignored); see .dlt/secrets.toml.example.
[destination.clickhouse.credentials]
host = "localhost"
port = 9000
http_port = 8123
database = "news"
username = "news"
secure = 0
