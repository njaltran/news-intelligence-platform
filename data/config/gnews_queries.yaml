# Google News RSS query catalogue. Acts as a force multiplier on top
# of the per-outlet feeds in sources.yaml.
#
# Each (country, topic|query) pair becomes one Google News RSS feed
# that returns ~100 items. Deduplication is by URL in the dlt merge
# disposition, so overlapping queries are safe.
#
# EA framing. This file is the [[Variety]] amplifier. Topic-sliced
# Google News surfaces outlets the per-outlet list will never cover
# (the Long Tail), while still anchoring on country and language.
#
# Format:
#   countries:
#     <ISO>:
#       lang: <BCP-47 lang>            # primary UI language
#       gl: <country code>
#       ceid: <country:lang>           # used only when langs is absent
#       langs: [<lang>, ...]           # optional fan-out across UI langs
#       topics: list of Google News section topics
#       queries: list of free-text search queries
#
# Each query is also fanned out across `when:` windows in code (see
# SEARCH_WINDOWS in sources/gnews.py), since each Google News RSS feed
# hard-caps at ~100 entries. URL dedup absorbs overlap.

countries:
  DE:
    lang: de
    gl: DE
    ceid: DE:de
    # German UI plus English UI. English widens diaspora outlets and
    # international wires that index Germany under broader regional
    # tags, mirroring the MM/KZ multi-lang pattern.
    langs:
      - de
      - en
    topics:
      - WORLD
      - NATION
      - BUSINESS
      - TECHNOLOGY
      - ENTERTAINMENT
      - SPORTS
      - SCIENCE
      - HEALTH
    queries:
