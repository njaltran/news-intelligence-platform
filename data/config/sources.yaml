# News outlet sources per country.
#
# Owned by Karina (curation) and Jack (scrapability assessment).
# Used by sources/rss.py (RSS resources) and sources/scrapers/* (HTML scrapes).
#
# Fields:
#   name        human-friendly outlet name
#   url         homepage
#   rss         RSS feed URL (if available)
#   language    ISO 639-1 code (de, en, it, my, kk, ru)
#   scrape      strategy: "rss" | "beautifulsoup" | "newsapi"
#   robots_ok   has robots.txt been checked? true/false/unknown
#   notes       quirks (paywalls, JS-rendered, encoding, etc.)

countries:
  DE:
    - name: Spiegel
      url: https://www.spiegel.de
      rss: https://www.spiegel.de/schlagzeilen/index.rss
      language: de
      scrape: rss
      robots_ok: unknown
      notes: ""
    - name: Tagesschau
      url: https://www.tagesschau.de
      rss: https://www.tagesschau.de/xml/rss2/
      language: de
      scrape: rss
      robots_ok: unknown
      notes: ""

  US:
    - name: NYT World
      url: https://www.nytimes.com/section/world
      rss: https://rss.nytimes.com/services/xml/rss/nyt/World.xml
      language: en
      scrape: rss
      robots_ok: unknown
      notes: "Section feed (World). Full text behind paywall, summary only in RSS."

  IT:
    - name: ANSA
      url: https://www.ansa.it
      rss: https://www.ansa.it/sito/ansait_rss.xml
      language: it
      scrape: rss
      robots_ok: unknown
      notes: ""

  MM:
    - name: Myanmar Now (EN)
      url: https://myanmar-now.org
      rss: https://myanmar-now.org/en/feed
      language: en
      scrape: rss
      robots_ok: unknown
      notes: "English edition. Burmese-language site needs separate scrape. Irrawaddy and Frontier Myanmar block bot UAs (403)."
    - name: BBC Burmese
      url: https://www.bbc.com/burmese
      rss: https://feeds.bbci.co.uk/burmese/rss.xml
      language: my
      scrape: rss
      robots_ok: unknown
      notes: "Burmese language. BBC RSS is well-engineered and stable."
    - name: RFA Burmese
      url: https://www.rfa.org/burmese
      rss: https://www.rfa.org/burmese/rss
      language: my
      scrape: rss
      robots_ok: unknown
      notes: "Burmese language. Radio Free Asia."
    - name: Mizzima Burmese
      url: https://www.mizzimaburmese.com/
      rss: ""
      language: my
      scrape: beautifulsoup
      robots_ok: unknown
      notes: "No RSS on the Burmese edition. Homepage scraped via sources/scrapers/mm/mizzima_burmese.py. ~60 posts per pull."

  KZ:
    - name: Astana Times
      url: https://astanatimes.com
      rss: https://astanatimes.com/feed/
      language: en
      scrape: rss
      robots_ok: unknown
      notes: "English-language outlet."
    - name: Azattyq (RFE/RL Kazakh)
      url: https://www.azattyq.org
      rss: https://www.azattyq.org/api/
      language: kk
      scrape: rss
      robots_ok: unknown
      notes: "Kazakh language. RFE/RL Kazakh service. Feed lives at /api/ not a normal RSS path."
    - name: NUR.KZ
      url: https://www.nur.kz
      rss: https://www.nur.kz/rss/all.rss
      language: ru
      scrape: rss
      robots_ok: unknown
      notes: "Russian-language outlet covering Kazakhstan. 50 entries per feed pull."
